services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mcp}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mcp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp-http:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-mcp}
      READONLY_DATABASE_URL: postgresql+asyncpg://${READONLY_USER:-mcp_readonly}:${READONLY_PASSWORD:-mcp_readonly}@postgres:5432/${POSTGRES_DB:-mcp}
    ports:
      - "8765:8765"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
    command: uvicorn mcp_server.http_server:app --host 0.0.0.0 --port 8765 --reload

volumes:
  postgres_data:
